services:
  mysql:
    image: mysql:8
    container_name: ticket-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

    mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: ticket-mysql-exporter
    command:
      - "--config.my-cnf=/cfg/mysql-exporter.cnf"
    volumes:
      - ./mysql-exporter.cnf:/cfg/mysql-exporter.cnf:ro
    ports:
      - "9104:9104"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ticket-net

  app:
    image: lucky050/ticket-reservation:latest
    container_name: ticket-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_TAGS_APPLICATION: ticket-app
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/TRSApp/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  prometheus:
    image: prom/prometheus:latest
    container_name: ticket-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
      - mysql-exporter
      - nginx-exporter
      - cadvisor
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: ticket-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/login"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: ticket-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/TRSApp/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: ticket-nginx-exporter
    command:
      - "-nginx.scrape-uri=http://ticket-nginx/nginx_status"
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - ticket-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ticket-cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - ticket-net

networks:
  ticket-net:
    driver: bridge

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
