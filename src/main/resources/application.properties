# ===============================
# Server Configuration
# ===============================
server.port=8000
server.servlet.context-path=/TRSApp

# ===============================
# JSP ViewResolver
# ===============================
spring.mvc.view.prefix=/WEB-INF/pages/
spring.mvc.view.suffix=.jsp

# ===============================
# DataSource Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# These values are used when running locally.
# Docker Compose will override them with environment variables.
spring.datasource.url=jdbc:mysql://mysql:3306/trsapplication
spring.datasource.username=ticketuser
spring.datasource.password=ticketpass

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# Spring Boot Actuator
# ===============================
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus

management.endpoint.health.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always